intro: |
    With 14 years of experience, I design accessible, high-impact digital products across Insurtech, Climate Tech, EdTech, and E-commerce, spanning B2C, B2B, and B2B2C across web and native mobile.<br/><br/> My background goes beyond design. I've written production code as a front-end developer, driven growth as a digital marketer, crafted brand identities as a graphic designer, and built a company from zero as a co-founder. That range gives me an unusually complete picture of how products get made and what it actually takes to ship something that works for users and for the business.

intro_part2: |
    I bring that full-stack perspective to every team I join, working fluidly across disciplines rather than handing off at the edges of a job description. I'm drawn to mission-driven companies using design and technology to create real-world impact. If that's what you're building, I'd love to be part of it.


